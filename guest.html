<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Tatame · Convidado · Synkan</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E畳%3C/text%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sumi: #1A1611;
    --sumi-2: #2A2520;
    --paper: #F5E8C8;
    --gold: #C19A3A;
    --gold-light: #FFD17A;
    --red: #BC002D;
    --green: #3B6D11;
    --border: rgba(245, 232, 200, 0.15);
  }
  body {
    background: var(--sumi);
    color: var(--paper);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .top {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 14px 20px;
    background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100;
    pointer-events: none;
  }
  .top-brand {
    font-family: 'Noto Serif JP', 'Yuji Syuku', serif;
    font-size: 13px; letter-spacing: 0.08em; opacity: 0.7;
  }
  .top-brand strong { color: var(--gold-light); font-weight: 600; }
  .badge-guest {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(193, 154, 58, 0.18);
    border: 0.5px solid rgba(193, 154, 58, 0.5);
    padding: 4px 12px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--gold-light); text-transform: uppercase;
  }
  /* Welcome screen */
  .welcome {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    z-index: 50;
    background:
      radial-gradient(circle at 30% 20%, rgba(193, 154, 58, 0.10), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(58, 36, 16, 0.4), transparent 50%),
      var(--sumi);
  }
  .welcome-card {
    background: rgba(42, 37, 32, 0.7);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px 28px;
    max-width: 440px; width: 100%;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
  }
  .kanji-tatame {
    font-family: 'Noto Serif JP', serif;
    font-size: 64px; line-height: 1;
    text-align: center;
    color: var(--gold);
    margin-bottom: 8px;
    text-shadow: 0 0 24px rgba(193, 154, 58, 0.35);
  }
  .welcome-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px; font-weight: 600;
    text-align: center;
    color: var(--paper);
    margin-bottom: 6px;
  }
  .welcome-sub {
    font-size: 13px;
    text-align: center;
    color: rgba(245, 232, 200, 0.55);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 11px; font-weight: 600;
    color: rgba(245, 232, 200, 0.65);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 5px;
  }
  .form-input {
    width: 100%; padding: 11px 14px;
    background: rgba(26, 22, 17, 0.6);
    border: 0.5px solid var(--border);
    border-radius: 9px;
    color: var(--paper);
    font: inherit; font-size: 14px;
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(193, 154, 58, 0.15);
  }
  .perm-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 18px;
  }
  .perm-row {
    background: rgba(26, 22, 17, 0.4);
    border: 0.5px solid var(--border);
    padding: 8px 10px; border-radius: 7px;
    font-size: 11px;
    display: flex; align-items: center; gap: 6px;
    color: rgba(245, 232, 200, 0.7);
  }
  .perm-row.on { color: var(--green); border-color: rgba(59, 109, 17, 0.4); }
  .perm-row.off { color: rgba(245, 232, 200, 0.35); text-decoration: line-through; }
  .btn-join {
    width: 100%; padding: 12px 18px;
    background: linear-gradient(135deg, var(--red), #9F0026);
    color: white;
    border: none;
    border-radius: 9px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 6px 18px rgba(188, 0, 45, 0.30);
  }
  .btn-join:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(188, 0, 45, 0.40); }
  .btn-join:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-join.is-loading { background: rgba(245, 232, 200, 0.15); color: rgba(245, 232, 200, 0.7); box-shadow: none; }
  .footer-hint {
    text-align: center; margin-top: 14px;
    font-size: 10.5px; color: rgba(245, 232, 200, 0.35);
    line-height: 1.5;
  }
  .footer-hint a { color: var(--gold); text-decoration: none; }
  /* Error state */
  .err-box {
    margin-top: 12px; padding: 10px 12px;
    background: rgba(188, 0, 45, 0.10);
    border: 0.5px solid rgba(188, 0, 45, 0.40);
    border-radius: 8px;
    font-size: 12px; color: #FFB4BD;
    line-height: 1.5;
  }
  /* Call screen — preenche tudo */
  .call {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    background: var(--sumi);
  }
  .call.active { display: flex; }
  .call-grid {
    flex: 1; min-height: 0;
    display: grid;
    gap: 4px;
    padding: 4px;
    background: var(--sumi);
  }
  .video-tile {
    position: relative;
    background: var(--sumi-2);
    border-radius: 10px;
    overflow: hidden;
    border: 0.5px solid var(--border);
  }
  .video-tile video {
    width: 100%; height: 100%;
    object-fit: cover;
    background: var(--sumi);
  }
  .tile-label {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    color: white;
    padding: 3px 9px; border-radius: 6px;
    font-size: 11px; font-weight: 500;
    display: flex; align-items: center; gap: 5px;
  }
  .tile-label.guest::before {
    content: '🪪';
    font-size: 12px;
  }
  .tile-empty {
    display: flex; align-items: center; justify-content: center;
    font-size: 64px; color: rgba(245, 232, 200, 0.18);
    font-family: 'Noto Serif JP', serif;
  }
  .controls {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 18px 20px;
    background: linear-gradient(0deg, rgba(0,0,0,0.4) 0%, transparent 100%);
  }
  .ctrl-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 0.5px solid var(--border);
    background: rgba(245, 232, 200, 0.08);
    color: var(--paper);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { background: rgba(245, 232, 200, 0.15); }
  .ctrl-btn.off { background: rgba(188, 0, 45, 0.85); border-color: rgba(188, 0, 45, 0.95); }
  .ctrl-btn.leave { background: var(--red); border-color: var(--red); }
  .ctrl-btn.leave:hover { background: #9F0026; }
  /* Mobile */
  @media (max-width: 640px) {
    .welcome-card { padding: 24px 20px; }
    .kanji-tatame { font-size: 48px; }
    .perm-grid { grid-template-columns: 1fr; }
    .ctrl-btn { width: 44px; height: 44px; font-size: 18px; }
  }
</style>
</head>
<body>

<div class="top">
  <div class="top-brand"><strong>畳</strong> Synkan · Tatame</div>
  <span class="badge-guest">Convidado</span>
</div>

<!-- Welcome / login screen -->
<div class="welcome" id="welcome-screen">
  <div class="welcome-card">
    <div class="kanji-tatame">畳</div>
    <div class="welcome-title">Bem-vindo ao Tatame</div>
    <div class="welcome-sub" id="welcome-sub">Validando seu convite…</div>

    <div id="form-fields" style="display:none;">
      <div class="form-group">
        <label class="form-label" for="guest-name-input">Seu nome (como aparece pros outros)</label>
        <input id="guest-name-input" class="form-input" type="text" placeholder="Ex: Maria · Cliente ACME" maxlength="60" />
      </div>

      <div class="perm-grid" id="perm-grid"></div>

      <button class="btn-join" id="btn-join" disabled>Entrar na sala</button>

      <div class="footer-hint">
        Ao entrar você aceita receber áudio/vídeo dos participantes.<br/>
        Powered by <a href="https://synkan.com.br" target="_blank">Synkan</a>
      </div>
    </div>

    <div id="err-area"></div>
  </div>
</div>

<!-- Call screen -->
<div class="call" id="call-screen">
  <div class="call-grid" id="video-grid"></div>
  <div class="controls">
    <button class="ctrl-btn" id="btn-mic" title="Microfone">🎙</button>
    <button class="ctrl-btn" id="btn-cam" title="Câmera">📹</button>
    <button class="ctrl-btn" id="btn-screen" title="Compartilhar tela" style="display:none;">🖥</button>
    <button class="ctrl-btn leave" id="btn-leave" title="Sair">📞</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
// Guest page · Synkan Tatame
// ────────────────────────────────────────────────────────────────────
// Página standalone (sem app Synkan). Valida convite + entra em sala
// LiveKit. Sem acesso a chat, módulos, nada — só vídeo/áudio.
// ════════════════════════════════════════════════════════════════════
(function() {
  'use strict';

  // ── Config ───────────────────────────────────────────────────────
  // Detectado automaticamente; pode ser sobrescrito setando antes do load
  const TOKEN_ENDPOINT = window.GUEST_TOKEN_ENDPOINT
    || (window.SUPABASE_URL ? `${window.SUPABASE_URL}/functions/v1/livekit-guest-token` : null);
  let LIVEKIT_WS_URL = window.LIVEKIT_WS_URL || null; // pode vir do endpoint também

  // ── Lê token da URL ──────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const inviteToken = params.get('t') || params.get('token');

  const $welcomeSub = document.getElementById('welcome-sub');
  const $formFields = document.getElementById('form-fields');
  const $errArea = document.getElementById('err-area');
  const $nameInput = document.getElementById('guest-name-input');
  const $btnJoin = document.getElementById('btn-join');
  const $permGrid = document.getElementById('perm-grid');

  function showError(msg, detail) {
    $errArea.innerHTML = `<div class="err-box"><strong>⚠ ${msg}</strong>${detail ? '<br/><span style="opacity:.7;">'+detail+'</span>' : ''}</div>`;
    $welcomeSub.textContent = 'Verifique o link com quem te convidou.';
  }

  if (!inviteToken) {
    showError('Link inválido', 'O link de convite não tem token. Peça um novo pra quem te convidou.');
    return;
  }
  if (!TOKEN_ENDPOINT) {
    showError('Configuração incompleta', 'Endpoint do token não configurado. Contate o owner do workspace.');
    return;
  }

  // ── Stash permissões pra mostrar na tela ─────────────────────────
  // Tem que esperar o user clicar "Entrar" pra requisitar o JWT real
  // (já que JWT marca uso e expira em 6h). Mas podemos PRE-validar
  // o convite (sem marcar uso) — não. Por simplicidade, mostramos
  // todas as 3 permissões possíveis no form, validamos só ao entrar.
  $welcomeSub.innerHTML = 'Você foi convidado pra uma sala privada.<br/>Defina como quer aparecer.';
  $formFields.style.display = '';

  // Permissões padrão exibidas (a Edge Function vai retornar as reais)
  function renderPerms(perms) {
    perms = perms || {
      can_publish_video: true, can_publish_audio: true,
      can_share_screen: false, can_be_recorded: true
    };
    const rows = [
      { label: '📹 Câmera', key: 'can_publish_video' },
      { label: '🎙 Microfone', key: 'can_publish_audio' },
      { label: '🖥 Tela', key: 'can_share_screen' },
      { label: '⏺ Pode ser gravado', key: 'can_be_recorded' },
    ];
    $permGrid.innerHTML = rows.map(r => `
      <div class="perm-row ${perms[r.key] ? 'on' : 'off'}">
        ${perms[r.key] ? '✓' : '✗'} ${r.label}
      </div>
    `).join('');
  }
  renderPerms();

  // Habilita botão quando tem nome
  $nameInput.addEventListener('input', () => {
    const name = $nameInput.value.trim();
    $btnJoin.disabled = name.length < 2;
  });
  $nameInput.focus();

  // ── Lazy-load LiveKit SDK ───────────────────────────────────────
  let _lkSdkLoading = null;
  function loadLkSDK() {
    if (window.LivekitClient) return Promise.resolve(window.LivekitClient);
    if (_lkSdkLoading) return _lkSdkLoading;
    _lkSdkLoading = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js';
      s.async = true;
      s.onload = () => setTimeout(() => {
        if (window.LivekitClient) resolve(window.LivekitClient);
        else reject(new Error('LivekitClient não disponível'));
      }, 100);
      s.onerror = () => reject(new Error('Falha ao carregar LiveKit SDK'));
      document.head.appendChild(s);
    });
    return _lkSdkLoading;
  }

  // ── Conecta na sala ─────────────────────────────────────────────
  let room = null;
  let localTracks = { audio: null, video: null, screen: null };

  async function joinCall() {
    const name = $nameInput.value.trim();
    if (!name || name.length < 2) return;

    $btnJoin.classList.add('is-loading');
    $btnJoin.textContent = 'Conectando…';
    $btnJoin.disabled = true;
    $errArea.innerHTML = '';

    try {
      // 1) Solicita token + permissões
      const tokenRes = await fetch(TOKEN_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ invite_token: inviteToken, guest_name: name }),
      });
      if (!tokenRes.ok) {
        const errText = await tokenRes.text();
        let errMsg = 'Não foi possível validar o convite.';
        try {
          const errJson = JSON.parse(errText);
          if (errJson.error === 'expired') errMsg = 'Este convite expirou.';
          else if (errJson.error === 'max_uses_reached') errMsg = 'Este convite já foi usado.';
          else if (errJson.error === 'invalid_token') errMsg = 'Este link de convite é inválido.';
          else if (errJson.error === 'invalid_invite') errMsg = 'Convite inválido ou revogado.';
        } catch(_){}
        throw new Error(errMsg);
      }
      const tokenData = await tokenRes.json();
      const jwt = tokenData.token;
      const roomName = tokenData.room_name;
      const perms = tokenData.permissions || {};
      LIVEKIT_WS_URL = LIVEKIT_WS_URL || tokenData.livekit_ws_url;
      if (!LIVEKIT_WS_URL) throw new Error('URL do servidor LiveKit não configurada.');
      renderPerms(perms);

      // 2) Carrega SDK
      const LK = await loadLkSDK();

      // 3) Cria room + conecta
      room = new LK.Room({
        adaptiveStream: true,
        dynacast: true,
      });

      // Listeners
      room.on(LK.RoomEvent.ParticipantConnected, p => addParticipantTile(p));
      room.on(LK.RoomEvent.ParticipantDisconnected, p => removeParticipantTile(p));
      room.on(LK.RoomEvent.TrackSubscribed, (track, pub, p) => attachTrack(track, p));
      room.on(LK.RoomEvent.TrackUnsubscribed, (track) => track.detach().forEach(el => el.remove()));
      room.on(LK.RoomEvent.Disconnected, () => {
        document.getElementById('call-screen').classList.remove('active');
        document.getElementById('welcome-screen').style.display = 'flex';
        $welcomeSub.textContent = 'Chamada encerrada.';
        $formFields.style.display = 'none';
        $errArea.innerHTML = `<div class="err-box" style="border-color: var(--border); background: rgba(245,232,200,.05); color: rgba(245,232,200,.7);">Você saiu da sala. Pode fechar essa aba.</div>`;
      });

      await room.connect(LIVEKIT_WS_URL, jwt);

      // 4) Publica tracks conforme permissões
      if (perms.can_publish_audio) {
        try {
          localTracks.audio = await LK.createLocalAudioTrack();
          await room.localParticipant.publishTrack(localTracks.audio);
        } catch(e) { console.warn('[guest] mic falhou:', e); }
      }
      if (perms.can_publish_video) {
        try {
          localTracks.video = await LK.createLocalVideoTrack({ resolution: LK.VideoPresets.h540.resolution });
          await room.localParticipant.publishTrack(localTracks.video);
        } catch(e) { console.warn('[guest] cam falhou:', e); }
      }

      // 5) Mostra tela de call
      document.getElementById('welcome-screen').style.display = 'none';
      const $call = document.getElementById('call-screen');
      $call.classList.add('active');

      // Adiciona local tile
      addLocalTile(name);
      // Adiciona participants já conectados
      room.remoteParticipants.forEach(p => {
        addParticipantTile(p);
        p.trackPublications.forEach(pub => {
          if (pub.track) attachTrack(pub.track, p);
        });
      });

      // Botões de controle
      setupControls(perms);

    } catch (e) {
      console.error('[guest] join error:', e);
      $btnJoin.classList.remove('is-loading');
      $btnJoin.disabled = false;
      $btnJoin.textContent = 'Tentar de novo';
      showError(e.message || 'Erro ao conectar', e.detail || '');
    }
  }

  function setupControls(perms) {
    const $mic = document.getElementById('btn-mic');
    const $cam = document.getElementById('btn-cam');
    const $screen = document.getElementById('btn-screen');
    const $leave = document.getElementById('btn-leave');

    if (!perms.can_publish_audio) $mic.style.display = 'none';
    if (!perms.can_publish_video) $cam.style.display = 'none';
    if (perms.can_share_screen) $screen.style.display = '';

    $mic.onclick = async () => {
      const enabled = !room.localParticipant.isMicrophoneEnabled;
      await room.localParticipant.setMicrophoneEnabled(enabled);
      $mic.classList.toggle('off', !enabled);
      $mic.textContent = enabled ? '🎙' : '🔇';
    };
    $cam.onclick = async () => {
      const enabled = !room.localParticipant.isCameraEnabled;
      await room.localParticipant.setCameraEnabled(enabled);
      $cam.classList.toggle('off', !enabled);
      $cam.textContent = enabled ? '📹' : '🚫';
    };
    $screen.onclick = async () => {
      const enabled = !room.localParticipant.isScreenShareEnabled;
      try {
        await room.localParticipant.setScreenShareEnabled(enabled);
        $screen.classList.toggle('off', !enabled);
      } catch(e) { console.warn('[guest] screen share:', e); }
    };
    $leave.onclick = () => { room.disconnect(); };
  }

  // ── Tiles ────────────────────────────────────────────────────────
  function getGridEl() { return document.getElementById('video-grid'); }
  function tileId(participantSid) { return 'tile-' + participantSid; }

  function adjustGrid() {
    const grid = getGridEl();
    const n = grid.children.length;
    if (n === 0) return;
    let cols;
    if (n === 1) cols = 1;
    else if (n <= 4) cols = 2;
    else if (n <= 9) cols = 3;
    else cols = 4;
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridAutoRows = 'minmax(0, 1fr)';
  }

  function addLocalTile(name) {
    const id = 'tile-local';
    if (document.getElementById(id)) return;
    const tile = document.createElement('div');
    tile.className = 'video-tile';
    tile.id = id;
    tile.innerHTML = `
      <div class="tile-empty">畳</div>
      <span class="tile-label guest">${escapeHtml(name)} (você)</span>
    `;
    getGridEl().appendChild(tile);
    adjustGrid();

    // Anexa track local de vídeo se houver
    if (localTracks.video) {
      const videoEl = localTracks.video.attach();
      videoEl.style.transform = 'scaleX(-1)';
      tile.querySelector('.tile-empty')?.remove();
      tile.insertBefore(videoEl, tile.firstChild);
    }
  }

  function addParticipantTile(p) {
    const id = tileId(p.sid);
    if (document.getElementById(id)) return;
    const tile = document.createElement('div');
    tile.className = 'video-tile';
    tile.id = id;
    // Detecta se é guest (pelo metadata)
    let isGuest = false;
    try {
      const meta = p.metadata ? JSON.parse(p.metadata) : null;
      isGuest = meta?.guest === true;
    } catch(_){}
    const name = p.name || p.identity || 'Participante';
    tile.innerHTML = `
      <div class="tile-empty">${isGuest ? '🪪' : '人'}</div>
      <span class="tile-label ${isGuest ? 'guest' : ''}">${escapeHtml(name)}</span>
    `;
    getGridEl().appendChild(tile);
    adjustGrid();
  }

  function removeParticipantTile(p) {
    const el = document.getElementById(tileId(p.sid));
    if (el) el.remove();
    adjustGrid();
  }

  function attachTrack(track, participant) {
    const tile = document.getElementById(tileId(participant.sid));
    if (!tile) return;
    if (track.kind === 'video' || track.kind === 'screen_share') {
      const videoEl = track.attach();
      videoEl.style.width = '100%';
      videoEl.style.height = '100%';
      videoEl.style.objectFit = 'cover';
      tile.querySelector('.tile-empty')?.remove();
      tile.insertBefore(videoEl, tile.firstChild);
    } else if (track.kind === 'audio') {
      const audioEl = track.attach();
      audioEl.style.display = 'none';
      document.body.appendChild(audioEl);
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
    }[c]));
  }

  $btnJoin.addEventListener('click', joinCall);
  $nameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !$btnJoin.disabled) joinCall();
  });
})();
</script>

<!--
  Config necessária ANTES do script acima rodar (geralmente injetado pelo
  servidor ou em config.js, similar ao que index.html já faz):

    window.SUPABASE_URL    = 'https://YOUR-PROJECT.supabase.co'
